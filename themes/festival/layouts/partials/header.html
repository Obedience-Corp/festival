<header class="site-header">
  <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle navigation">☰</button>
  <a href="{{ site.Home.RelPermalink }}" class="site-header__logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
      <line x1="4" y1="22" x2="4" y2="15"/>
    </svg>
    {{ .Site.Title }}
  </a>
  <nav class="site-header__nav">
    {{ with site.GetPage "/docs/getting-started/quickstart" }}
      <a href="{{ .RelPermalink }}" class="site-header__link">Docs</a>
    {{ end }}
    {{ with site.GetPage "/docs/getting-started/installation" }}
      <a href="{{ .RelPermalink }}" class="site-header__link">Install</a>
    {{ end }}
    {{ with .Site.Params.repo }}
      <a href="{{ . }}" class="site-header__link" target="_blank" rel="noopener">GitHub</a>
    {{ end }}
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">☾</button>
  </nav>
</header>
