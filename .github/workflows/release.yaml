name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: |
            fest/go.sum
            camp/go.sum

      - name: Set up just
        uses: extractions/setup-just@v3

      - name: Configure private Go modules
        if: env.GO_PRIVATE_TOKEN != ''
        run: |
          git config --global url."https://${GO_PRIVATE_TOKEN}@github.com/".insteadOf "https://github.com/"
        env:
          GO_PRIVATE_TOKEN: ${{ secrets.GO_PRIVATE_TOKEN }}
          GOPRIVATE: github.com/Obedience-Corp/*

      - name: Import AUR SSH key
        if: env.AUR_SSH_KEY != ''
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}

      - name: Detect release channel
        id: release_channel
        run: |
          case "${GITHUB_REF_NAME}" in
            v*-dev.*)
              echo "mode=dev" >> "$GITHUB_OUTPUT"
              echo "cli_profile=dev" >> "$GITHUB_OUTPUT"
              ;;
            v*-rc.*)
              echo "mode=rc" >> "$GITHUB_OUTPUT"
              echo "cli_profile=stable" >> "$GITHUB_OUTPUT"
              ;;
            v*)
              echo "mode=stable" >> "$GITHUB_OUTPUT"
              echo "cli_profile=stable" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "unsupported tag format: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

      - name: Verify tagged camp/fest pins
        run: just test release-pins "${{ steps.release_channel.outputs.mode }}"

      - name: Check mirrored docs
        run: just test doc-sync

      - name: Check docs profile
        run: just test docs-profile

      - name: Test release operator
        run: just test release-operator

      - name: Build CLIs for smoke test
        run: CLI_PROFILE=${{ steps.release_channel.outputs.cli_profile }} just build all

      - name: Run beginner path smoke
        run: just test beginner-path-smoke

      - name: Check Claude Code plugin sync
        run: |
          export PATH="$(pwd)/bin:$PATH"
          just plugin check

      - name: Generate bundled release notes
        run: |
          cd tools/release-notes
          go run . \
            --repo-root ../.. \
            --tag "${GITHUB_REF_NAME}" \
            --output "${RUNNER_TEMP}/festival-release-notes.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPRIVATE: github.com/Obedience-Corp/*
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          SCOOP_GITHUB_TOKEN: ${{ secrets.SCOOP_GITHUB_TOKEN }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

      - name: Rewrite GitHub release body from bundled component notes
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --repo Obedience-Corp/festival \
            --notes-file "${RUNNER_TEMP}/festival-release-notes.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
