checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

brews:
  - repository:
      owner: Obedience-Corp
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

    name: festival

    homepage: "https://github.com/Obedience-Corp/festival"
    description: "Festival Methodology CLI suite (fest + camp)"
    license: "BUSL-1.1"

    directory: Formula

    test: |
      system "#{bin}/fest", "--version"
      system "#{bin}/camp", "--version"

    install: |
      bin.install "fest"
      bin.install "camp"
      bash_completion.install "completions/fest.bash" => "fest"
      zsh_completion.install "completions/_fest"
      fish_completion.install "completions/fest.fish"

    caveats: |
      To activate shell completions and camp shell integration, add to your shell config:

        # bash (~/.bashrc)
        eval "$(camp shell-init bash)"
        source <(fest completion bash)

        # zsh (~/.zshrc)
        eval "$(camp shell-init zsh)"
        source <(fest completion zsh)

        # fish (~/.config/fish/config.fish)
        camp shell-init fish | source
        fest completion fish | source

release:
  github:
    owner: Obedience-Corp
    name: festival

  prerelease: auto

  header: |
    ## Festival {{ .Tag }}

    Festival Methodology CLI suite release — includes `fest` and `camp`.

  footer: |
    **Full Changelog**: https://github.com/Obedience-Corp/festival/compare/{{ .PreviousTag }}...{{ .Tag }}

    ## Installation

    See [full installation guide](https://fest.build/install/) for all platforms.

    | Platform | Command |
    |----------|---------|
    | macOS | `brew install Obedience-Corp/tap/festival` |
    | Arch Linux | `yay -S festival-bin` |
    | Debian/Ubuntu | Download `.deb` from assets below |
    | Fedora/RHEL | Download `.rpm` from assets below |
    | Windows | Temporarily paused while Windows support is stabilized |

# macOS signing and notarization — disabled until Apple Developer account is configured.
# To enable: set MACOS_SIGN_P12, MACOS_SIGN_PASSWORD, MACOS_NOTARY_KEY,
# MACOS_NOTARY_KEY_ID, and MACOS_NOTARY_ISSUER_ID secrets, then uncomment below.
#
