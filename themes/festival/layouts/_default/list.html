{{ define "main" }}
  {{ if .Params.redirectTo }}
  <meta http-equiv="refresh" content="0; url={{ .Params.redirectTo }}">
  <script>window.location.href = "{{ .Params.redirectTo }}";</script>
  <p>Redirecting to <a href="{{ .Params.redirectTo }}">{{ .Title }}</a>...</p>
  {{ else }}
  <article>
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    {{ range .Pages }}
      <div style="margin-bottom: 0.5rem;">
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      </div>
    {{ end }}
  </article>
  {{ end }}
{{ end }}
