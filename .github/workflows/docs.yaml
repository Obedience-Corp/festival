name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'themes/**'
      - 'hugo.yaml'
      - 'static/**'
      - '.github/workflows/docs.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      # Override baseURL for GitHub Pages deployment.
      # When fest.build DNS is ready, change this to https://fest.build
      # and add a static/CNAME file containing "fest.build".
      - name: Build site
        run: hugo --minify --baseURL "https://obedience-corp.github.io/festival/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
