# .goreleaser.yaml
version: 2

before:
  hooks:
    - cd fest && go mod tidy
    - cd camp && go mod tidy

builds:
  - id: fest
    dir: fest
    main: ./cmd/fest
    binary: fest
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/Obedience-Corp/fest/internal/commands.Version={{.Version}}
      - -X github.com/Obedience-Corp/fest/internal/commands.GitCommit={{.Commit}}
      - -X github.com/Obedience-Corp/fest/internal/commands.BuildTime={{.Date}}

  - id: camp
    dir: camp
    main: ./cmd/camp
    binary: camp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/obediencecorp/camp/internal/version.Version={{.Version}}
      - -X github.com/obediencecorp/camp/internal/version.Commit={{.Commit}}
      - -X github.com/obediencecorp/camp/internal/version.BuildDate={{.Date}}

archives:
  - id: festival-suite
    builds: [fest, camp]
    name_template: >-
      festival-
      {{- .Version }}-
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}-
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - install.sh

nfpms:
  - id: festival
    package_name: festival
    file_name_template: "{{ .ConventionalFileName }}"
    builds:
      - fest
      - camp
    vendor: Obedience Corp
    homepage: "https://obedience-corp.github.io/festival"
    maintainer: "Lance Rogers <lance@obediencecorp.com>"
    description: |-
      Festival Methodology CLI suite.
      AI-native project planning with fest and camp.
    license: "BUSL-1.1"
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    bindir: /usr/bin
    section: devel
    priority: optional
    contents:
      - src: ./LICENSE
        dst: /usr/share/licenses/festival/LICENSE
      - src: ./README.md
        dst: /usr/share/doc/festival/README.md

aurs:
  - name: festival-bin
    ids:
      - festival-suite
    homepage: "https://obedience-corp.github.io/festival"
    description: "Festival Methodology CLI suite (fest + camp) - AI-native project planning"
    maintainers:
      - "Lance Rogers <lance@obediencecorp.com>"
    license: "BUSL-1.1"
    private_key: "{{ .Env.AUR_SSH_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/festival-bin.git"
    provides:
      - fest
      - camp
    conflicts:
      - fest
      - camp
    package: |-
      install -Dm755 "./fest" "${pkgdir}/usr/bin/fest"
      install -Dm755 "./camp" "${pkgdir}/usr/bin/camp"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/festival/LICENSE"
    commit_msg_template: "Update to {{ .Tag }}"

scoops:
  - name: festival
    repository:
      owner: Obedience-Corp
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_GITHUB_TOKEN }}"
    homepage: "https://obedience-corp.github.io/festival"
    description: "Festival Methodology CLI suite (fest + camp) - AI-native project planning"
    license: "BUSL-1.1"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

brews:
  - repository:
      owner: Obedience-Corp
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

    name: festival

    homepage: "https://github.com/Obedience-Corp/festival"
    description: "Festival Methodology CLI suite (fest + camp)"
    license: "BUSL-1.1"

    folder: Formula

    test: |
      system "#{bin}/fest", "--version"
      system "#{bin}/camp", "--version"

    install: |
      bin.install "fest"
      bin.install "camp"

release:
  github:
    owner: Obedience-Corp
    name: festival

  prerelease: auto

  header: |
    ## Festival {{ .Tag }}

    Festival Methodology CLI suite release — includes `fest` and `camp`.

  footer: |
    **Full Changelog**: https://github.com/Obedience-Corp/festival/compare/{{ .PreviousTag }}...{{ .Tag }}

    ## Installation

    See [full installation guide](https://obedience-corp.github.io/festival/install/) for all platforms.

    | Platform | Command |
    |----------|---------|
    | macOS | `brew install Obedience-Corp/tap/festival` |
    | Arch Linux | `yay -S festival-bin` |
    | Debian/Ubuntu | Download `.deb` from assets below |
    | Fedora/RHEL | Download `.rpm` from assets below |
    | Windows | `scoop bucket add obey https://github.com/lancekrogers/scoop-bucket && scoop install festival` |

universal_binaries:
  - replace: true
    id: fest
    name_template: "fest"
  - replace: true
    id: camp
    name_template: "camp"
