# .goreleaser.yaml
version: 2

before:
  hooks:
    - bash scripts/completions.sh

builds:
  - id: fest
    dir: fest
    main: ./cmd/fest
    binary: fest
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      # Windows is intentionally disabled for stable releases until
      # fest+camp Windows runtime behavior is production-ready.
      # Re-enable by uncommenting:
      # - windows
    goarch:
      - amd64
      - arm64
    # When Windows is re-enabled, keep arm64 ignored until supported:
    # ignore:
    #   - goos: windows
    #     goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/Obedience-Corp/fest/internal/version.Version={{.Version}}
      - -X github.com/Obedience-Corp/fest/internal/version.Commit={{.Commit}}
      - -X github.com/Obedience-Corp/fest/internal/version.BuildDate={{.Date}}

  - id: camp
    dir: camp
    main: ./cmd/camp
    binary: camp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      # Windows is intentionally disabled for stable releases until
      # fest+camp Windows runtime behavior is production-ready.
      # Re-enable by uncommenting:
      # - windows
    goarch:
      - amd64
      - arm64
    # When Windows is re-enabled, keep arm64 ignored until supported:
    # ignore:
    #   - goos: windows
    #     goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/Obedience-Corp/camp/internal/version.Version={{.Version}}
      - -X github.com/Obedience-Corp/camp/internal/version.Commit={{.Commit}}
      - -X github.com/Obedience-Corp/camp/internal/version.BuildDate={{.Date}}

archives:
  - id: festival-suite
    builds: [fest, camp]
    name_template: >-
      festival-
      {{- .Version }}-
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}-
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    # When Windows builds are re-enabled, keep Windows archives as .zip:
    # format_overrides:
    #   - goos: windows
    #     format: zip
    files:
      - README.md
      - LICENSE
      - install.sh
      - completions/*

nfpms:
  - id: festival
    package_name: festival
    file_name_template: "{{ .ConventionalFileName }}"
    builds:
      - fest
      - camp
    vendor: Obedience Corp
    homepage: "https://fest.build"
    maintainer: "Lance Rogers <lance@obediencecorp.com>"
    description: |-
      Festival Methodology CLI suite.
      AI-native project planning with fest and camp.
    license: "BUSL-1.1"
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    bindir: /usr/bin
    section: devel
    priority: optional
    contents:
      - src: ./LICENSE
        dst: /usr/share/licenses/festival/LICENSE
      - src: ./README.md
        dst: /usr/share/doc/festival/README.md
      - src: ./completions/fest.bash
        dst: /usr/share/bash-completion/completions/fest
      - src: ./completions/_fest
        dst: /usr/share/zsh/vendor-completions/_fest
      - src: ./completions/fest.fish
        dst: /usr/share/fish/vendor_completions.d/fest.fish

aurs:
  - name: festival-bin
    ids:
      - festival-suite
    homepage: "https://fest.build"
    description: "Festival Methodology CLI suite (fest + camp) - AI-native project planning"
    maintainers:
      - "Lance Rogers <lance@obediencecorp.com>"
    license: "BUSL-1.1"
    private_key: "{{ .Env.AUR_SSH_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/festival-bin.git"
    provides:
      - fest
      - camp
    conflicts:
      - fest
      - camp
    package: |-
      install -Dm755 "./fest" "${pkgdir}/usr/bin/fest"
      install -Dm755 "./camp" "${pkgdir}/usr/bin/camp"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/festival/LICENSE"
      install -Dm644 "./completions/fest.bash" "${pkgdir}/usr/share/bash-completion/completions/fest"
      install -Dm644 "./completions/_fest" "${pkgdir}/usr/share/zsh/site-functions/_fest"
      install -Dm644 "./completions/fest.fish" "${pkgdir}/usr/share/fish/vendor_completions.d/fest.fish"
    commit_msg_template: "Update to {{ .Tag }}"

# Scoop publishing is temporarily disabled while Windows support is stabilized.
